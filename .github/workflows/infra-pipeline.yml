name: Data Layer Pipeline

on:
  pull_request:
    branches:
      - develop
      - 'release/*'
      - main
  push:
    branches:
      - main

jobs:
  terraform-ci:
    name: "Terraform CI"
    if: github.event_name == 'pull_request' && (github.base_ref == 'develop' || startsWith(github.base_ref, 'release/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Format
        run: terraform fmt -check -recursive
      - name: Terraform Init AWS
        working-directory: aws
        run: terraform init -backend-config="bucket=${{ secrets.AWS_S3_TF_STATE_BUCKET_NAME }}" -backend-config="region=${{ secrets.AWS_REGION }}"
      - name: Terraform Validate AWS
        working-directory: aws
        run: terraform validate

  terraform-plan:
    name: "Terraform Plan"
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aws
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_S3_TF_STATE_BUCKET_NAME: ${{ secrets.AWS_S3_TF_STATE_BUCKET_NAME }}
      TF_VAR_db_password: ${{ secrets.AWS_RDS_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init -backend-config="bucket=$AWS_S3_TF_STATE_BUCKET_NAME" -backend-config="region=$AWS_REGION"
      - name: Terraform Plan
        run: terraform plan -no-color

  terraform-apply:
    name: "Terraform Apply"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aws
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_S3_TF_STATE_BUCKET_NAME: ${{ secrets.AWS_S3_TF_STATE_BUCKET_NAME }}
      TF_VAR_db_password: ${{ secrets.AWS_RDS_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init -backend-config="bucket=$AWS_S3_TF_STATE_BUCKET_NAME" -backend-config="region=$AWS_REGION"
      - name: Terraform Apply
        run: terraform apply -auto-approve
